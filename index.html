<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ESSE STUDIO: Ultra Neon</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

<style>
/* --- ORİJİNAL CSS AYNEN KORUNDU --- */
:root {
--gold:#ffcf25;--bg:#050505;--fire:#ff4500;--green:#00ff88;
--blue:#00d9ff;--boss:#cc00ff;--glass:rgba(255,255,255,.05)
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Montserrat',sans-serif;user-select:none}
body{
background:radial-gradient(circle at center,#111 0%,#000 100%);
color:white;height:100vh;display:flex;flex-direction:column;overflow:hidden
}
.header{text-align:center;padding:20px 10px;background:rgba(0,0,0,.4);
backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,207,37,.2)}
#balance{font-family:'Orbitron',sans-serif;font-size:42px;font-weight:900;color:var(--gold)}
.progress-bar{height:8px;background:#111;border-radius:10px;overflow:hidden;margin:8px auto;width:85%}
#level-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--fire));width:0%;transition:.8s}
.btn-act{
background:linear-gradient(135deg,var(--gold),#f39c12);
border:none;padding:12px;border-radius:12px;font-weight:900;
font-family:'Orbitron';cursor:pointer;color:black;width:100%;
}
</style>
</head>

<body>

<div class="header">
<span style="font-size:10px;color:#555">TOTAL ASSETS</span>
<div id="balance">0</div>
<div class="progress-bar"><div id="level-fill"></div></div>
<div style="display:flex;justify-content:space-between;width:85%;margin:auto;font-size:10px">
<span id="lv-text">LEVEL 1</span>
<span id="passive-text">0.0/s</span>
</div>
</div>

<div style="flex:1;display:flex;justify-content:center;align-items:center">
<img src="https://cdn-icons-png.flaticon.com/512/2529/2529396.png"
style="width:220px" onclick="clickCoin(event)">
</div>

<script>
/* ===============================
   ORİJİNAL GLOBAL STATE
================================ */
let b = parseFloat(localStorage.getItem('b')) || 0;
let e = parseInt(localStorage.getItem('e')) || 500;
let lv = parseInt(localStorage.getItem('lv')) || 1;
let a = parseFloat(localStorage.getItem('a')) || 0;
let turbo=false;

/* ===============================
   🔥 EK SİSTEMLER (UI YOK)
================================ */
let prestige = parseInt(localStorage.getItem('prestige')) || 0;
let critChance = parseFloat(localStorage.getItem('critChance')) || 0.05;
let todayEvent = localStorage.getItem('todayEvent') || "NONE";
let lastDay = localStorage.getItem('lastDay') || "";

/* DAILY RESET + EVENT */
(function(){
const today=new Date().toDateString();
if(lastDay!==today){
lastDay=today;
localStorage.setItem('lastDay',today);
const ev=["NONE","CRIT","PASSIVE","TURBO"];
todayEvent=ev[Math.floor(Math.random()*ev.length)];
localStorage.setItem('todayEvent',todayEvent);
localStorage.setItem('dailyClicks',0);
}})();

/* ===============================
   CLICK (CRIT ENTEGRE)
================================ */
function clickCoin(ev){
if(e<3)return;
let base=(Math.floor(lv/2)+1)*(turbo?5:1);
let gain=(Math.random()<critChance?base*10:base);
b+=gain;
e-=3;
up();
}

/* ===============================
   PRESTIGE (UI YOK)
================================ */
function prestigeNow(){
if(lv<20)return alert("Prestige için Level 20");
prestige++;
critChance+=0.02;
b=0;lv=1;a=0;e=500;
localStorage.setItem('prestige',prestige);
localStorage.setItem('critChance',critChance);
alert("PRESTIGE! Kalıcı Crit +");
}

/* ===============================
   UPDATE
================================ */
function up(){
let need=5000*Math.pow(lv,3);
if(b>=need){lv++;}

document.getElementById('balance').innerText=Math.floor(b).toLocaleString();
document.getElementById('level-fill').style.width=Math.min((b/need)*100,100)+"%";
document.getElementById('lv-text').innerText="LEVEL "+lv;
document.getElementById('passive-text').innerText=a.toFixed(1)+"/s";

localStorage.setItem('b',b);
localStorage.setItem('lv',lv);
localStorage.setItem('e',e);
localStorage.setItem('a',a);
}

/* ===============================
   PASSIVE + EVENT BONUS
================================ */
setInterval(()=>{
let mult=1;
if(todayEvent==="PASSIVE")mult=1.5;
b+=(a/10)*mult;
if(e<500)e++;
up();
},100);

up();
</script>

</body>
</html>
