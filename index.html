<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESSE STUDIO: Pro Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffcf25; --bg: #050505; --fire: #ff4500; --green: #2ecc71; --blue: #0088cc; --purple: #9b59b6; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; user-select: none; touch-action: manipulation; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header */
        .header { text-align: center; padding: 15px; border-bottom: 1px solid #222; background: rgba(0,0,0,0.8); z-index: 10; }
        #balance { font-size: 40px; font-weight: 900; color: var(--gold); }
        #passive-inc { font-size: 12px; color: var(--green); margin-top: -5px; }

        /* Screens */
        .screen { flex-grow: 1; display: none; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; padding-bottom: 120px; }
        .active-screen { display: flex; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Cards & Buttons */
        .card { background: #111; padding: 15px; border-radius: 15px; width: 100%; margin-bottom: 10px; display: flex; align-items: center; border: 1px solid #333; }
        .btn-act { background: var(--gold); border: none; padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; color: black; font-size: 13px; }
        .btn-act:disabled { background: #333; color: #666; }

        /* Coin */
        #main-coin { width: 220px; height: 220px; cursor: pointer; transition: transform 0.05s; border-radius: 50%; }
        #main-coin:active { transform: scale(0.9); }

        /* Progress */
        .progress-bar { height: 10px; background: #222; border-radius: 10px; overflow: hidden; width: 85%; margin: 10px 0; }
        #en-fill { height: 100%; background: var(--gold); width: 100%; transition: 0.2s; }

        /* Navigation */
        .nav { position: fixed; bottom: 0; width: 100%; background: #0a0a0a; display: flex; padding: 15px 0; border-top: 1px solid #222; z-index: 100; }
        .nav-item { flex: 1; text-align: center; color: #555; font-size: 10px; font-weight: bold; }
        .nav-item.active { color: var(--gold); }
        .nav-item span { display: block; font-size: 20px; }

        /* Rank List */
        .rank-card { justify-content: space-between; border-left: 4px solid var(--gold); }

        /* Floating Text */
        .floating-text { position: absolute; color: var(--gold); font-weight: 900; font-size: 30px; pointer-events: none; animation: floatUp 0.6s forwards; z-index: 999; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

    <div class="header">
        <div id="balance">0</div>
        <div id="passive-inc">+0/sn</div>
        <div class="progress-bar" style="margin: 5px auto;"><div id="lv-fill" style="height:100%; background:var(--green); width:0%;"></div></div>
    </div>

    <div id="game-s" class="screen active-screen">
        <div style="flex-grow:1; display:flex; align-items:center; justify-content:center;">
            <img id="main-coin" src="https://api.dicebear.com/7.x/icons/svg?seed=gold&backgroundColor=ffcf25" onclick="clickCoin(event)">
        </div>
        <div style="width:100%; text-align:center;">
            <p style="font-size:12px; margin-bottom:5px;">ENERJİ: <span id="en-text">500/500</span></p>
            <div class="progress-bar" style="width:100%;"><div id="en-fill"></div></div>
        </div>
    </div>

    <div id="market-s" class="screen">
        <h2 style="color:var(--gold); margin-bottom:20px;">MARKET</h2>
        <div class="card">🚀 <div style="flex:1; margin-left:10px;"><b>Tık Gücü</b><br><small id="c-click">Maliyet: 500</small></div><button class="btn-act" onclick="upgrade('click')">YÜKSELT</button></div>
        <div class="card">🔋 <div style="flex:1; margin-left:10px;"><b>Enerji</b><br><small id="c-energy">Maliyet: 1000</small></div><button class="btn-act" onclick="upgrade('energy')">YÜKSELT</button></div>
        
        <h3 style="margin:20px 0 10px 0; color:var(--blue);">CÜZDAN</h3>
        <div class="card" style="background:rgba(0,136,204,0.1); border-color:var(--blue);">
            <div style="flex:1;"><b>TON WALLET</b><br><small id="w-status">Bağlı Değil</small></div>
            <button class="btn-act" id="w-btn" onclick="connectWallet()" style="background:var(--blue); color:white;">BAĞLA</button>
        </div>
    </div>

    <div id="rank-s" class="screen">
        <h2 style="color:var(--gold); margin-bottom:20px;">LİDERLER</h2>
        <div class="card rank-card"><span>1. ESSE Master</span><b>1.5M</b></div>
        <div class="card rank-card"><span>2. CryptoKing</span><b>850K</b></div>
        <div class="card rank-card"><span>3. TonHacker</span><b>420K</b></div>
        <div class="card rank-card" style="border-color:var(--green); margin-top:20px;">
            <span>SİZ</span><b id="my-rank-val">0</b>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="sh(this,'game-s')"><span>💰</span>TAP</div>
        <div class="nav-item" onclick="sh(this,'market-s')"><span>⚡</span>MARKET</div>
        <div class="nav-item" onclick="sh(this,'rank-s')"><span>🏆</span>RANK</div>
    </nav>

    <script>
        // Başlangıç Değişkenleri
        let b = parseFloat(localStorage.getItem('b')) || 0;
        let e = parseInt(localStorage.getItem('e')) || 500;
        let maxE = parseInt(localStorage.getItem('maxE')) || 500;
        let clickLv = parseInt(localStorage.getItem('clickLv')) || 1;
        let a = parseFloat(localStorage.getItem('a')) || 0;
        let wallet = localStorage.getItem('wallet') === 'true';

        // UI Güncelleme
        function up() {
            document.getElementById('balance').innerText = Math.floor(b).toLocaleString();
            document.getElementById('passive-inc').innerText = `+${a.toFixed(1)}/sn`;
            document.getElementById('en-text').innerText = `${e}/${maxE}`;
            document.getElementById('en-fill').style.width = (e / maxE * 100) + "%";
            document.getElementById('my-rank-val').innerText = Math.floor(b).toLocaleString();
            
            if(wallet) {
                document.getElementById('w-status').innerText = "UQAz...8X9k";
                document.getElementById('w-btn').innerText = "BAĞLI";
                document.getElementById('w-btn').disabled = true;
            }
            save();
        }

        // Tıklama
        function clickCoin(ev) {
            if(e >= clickLv) {
                b += clickLv; e -= clickLv;
                createFloatingText(ev);
                up();
            }
        }

        // Yükseltme
        function upgrade(type) {
            let cost = type === 'click' ? (clickLv * 500) : (maxE * 2);
            if(b >= cost) {
                b -= cost;
                if(type === 'click') clickLv++; else maxE += 100;
                up();
            } else { alert("Yetersiz bakiye!"); }
        }

        // Cüzdan Bağlama
        function connectWallet() {
            document.getElementById('w-btn').innerText = "...";
            setTimeout(() => {
                wallet = true;
                localStorage.setItem('wallet', 'true');
                up();
                alert("Cüzdan bağlandı!");
            }, 1500);
        }

        // Yardımcı Fonksiyonlar
        function createFloatingText(ev) {
            const ft = document.createElement('div');
            ft.className = 'floating-text';
            ft.innerText = `+${clickLv}`;
            ft.style.left = `${ev.clientX}px`;
            ft.style.top = `${ev.clientY}px`;
            document.body.appendChild(ft);
            setTimeout(() => ft.remove(), 600);
        }

        function save() {
            localStorage.setItem('b', b);
            localStorage.setItem('e', e);
            localStorage.setItem('maxE', maxE);
            localStorage.setItem('clickLv', clickLv);
        }

        function sh(el, id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active-screen');
            el.classList.add('active');
        }

        // Döngüler
        setInterval(() => {
            if(e < maxE) e++;
            up();
        }, 1000);

        // Telegram WebApp Başlat
        window.onload = () => {
            if(window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.expand();
            }
            up();
        };
    </script>
</body>
</html>
