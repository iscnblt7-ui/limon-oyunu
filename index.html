<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Money Clicker Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: radial-gradient(circle, #1a1a1a 0%, #000000 100%); 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        /* Üst Panel */
        .header { margin-top: 40px; text-align: center; }
        .balance-container { display: flex; align-items: center; gap: 10px; font-size: 42px; font-weight: bold; }
        .coin-icon { width: 40px; height: 40px; }

        /* Ana Tıklama Alanı */
        .click-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100%;
        }
        #money-btn {
            width: 250px;
            height: 250px;
            cursor: pointer;
            transition: transform 0.1s ease;
            -webkit-tap-highlight-color: transparent;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.3));
        }
        #money-btn:active { transform: scale(0.9); }

        /* Enerji Barı */
        .energy-container { width: 80%; margin-bottom: 100px; }
        .energy-text { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; color: #aaa; }
        .energy-bar-bg { width: 100%; height: 12px; background: #333; border-radius: 10px; overflow: hidden; }
        #energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ffcc00, #ffaa00); transition: width 0.2s; }

        /* Alt Menü */
        .nav-bar {
            position: fixed;
            bottom: 20px;
            width: 90%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 12px; color: #ccc; cursor: pointer; }
        .nav-item i { font-size: 20px; margin-bottom: 5px; }

        /* Tıklama Efekti */
        .plus-one {
            position: absolute;
            color: #ffcc00;
            font-size: 24px;
            font-weight: bold;
            animation: floatUp 0.8s ease-out forwards;
            pointer-events: none;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-100px); }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance-container">
            <img src="https://cdn-icons-png.flaticon.com/512/2529/2529396.png" class="coin-icon">
            <span id="balance">0</span>
        </div>
    </div>

    <div class="click-area" id="click-zone">
        <img id="money-btn" src="https://cdn-icons-png.flaticon.com/512/2529/2529396.png" alt="Money">
    </div>

    <div class="energy-container">
        <div class="energy-text">
            <span>⚡ Enerji</span>
            <span id="energy-val">500 / 500</span>
        </div>
        <div class="energy-bar-bg">
            <div id="energy-fill"></div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item">🏠<span>Ana Sayfa</span></div>
        <div class="nav-item">⛏️<span>Madenci</span></div>
        <div class="nav-item">📋<span>Görevler</span></div>
        <div class="nav-item">👥<span>Arkadaşlar</span></div>
    </div>

    <script>
        let balance = parseInt(localStorage.getItem('balance')) || 0;
        let energy = parseInt(localStorage.getItem('energy')) || 500;
        const maxEnergy = 500;

        const balanceElem = document.getElementById('balance');
        const energyElem = document.getElementById('energy-val');
        const energyFill = document.getElementById('energy-fill');
        const moneyBtn = document.getElementById('money-btn');
        const clickZone = document.getElementById('click-zone');

        // Başlangıç değerlerini yazdır
        balanceElem.innerText = balance.toLocaleString();
        updateEnergyUI();

        // Tıklama Fonksiyonu
        moneyBtn.addEventListener('click', (e) => {
            if (energy > 0) {
                balance += 1;
                energy -= 1;
                
                updateUI();
                spawnPlusOne(e);
                saveData();

                if (window.Telegram.WebApp.HapticFeedback) {
                    window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
                }
            }
        });

        function updateUI() {
            balanceElem.innerText = balance.toLocaleString();
            updateEnergyUI();
        }

        function updateEnergyUI() {
            energyElem.innerText = `${energy} / ${maxEnergy}`;
            energyFill.style.width = `${(energy / maxEnergy) * 100}%`;
        }

        function spawnPlusOne(e) {
            const plus = document.createElement('div');
            plus.innerText = '+1';
            plus.className = 'plus-one';
            plus.style.left = `${e.clientX}px`;
            plus.style.top = `${e.clientY}px`;
            document.body.appendChild(plus);
            setTimeout(() => plus.remove(), 800);
        }

        function saveData() {
            localStorage.setItem('balance', balance);
            localStorage.setItem('energy', energy);
        }

        // Enerji Yenileme (Her 3 saniyede 1 enerji)
        setInterval(() => {
            if (energy < maxEnergy) {
                energy += 1;
                updateEnergyUI();
                saveData();
            }
        }, 3000);

        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
