<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESSE STUDIO: Galactic Login</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffcf25; --bg: #050505; --fire: #ff4500; --green: #00ff88; --blue: #00d9ff; --boss: #cc00ff; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; user-select: none; touch-action: manipulation; }
        body { background: #000; color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* GİRİŞ EKRANI */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px;
        }
        .login-box {
            background: rgba(255,255,255,0.05); padding: 30px; border-radius: 25px; border: 2px solid var(--gold);
            text-align: center; width: 100%; max-width: 350px; box-shadow: 0 0 30px rgba(255,207,37,0.2);
        }
        .login-input {
            width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #333; background: #000;
            color: var(--gold); font-family: 'Orbitron'; text-align: center; margin: 20px 0; font-size: 16px;
        }

        /* HEADER */
        .header { text-align: center; padding: 15px; background: rgba(0,0,0,0.8); border-bottom: 2px solid var(--gold); display: none; }
        #balance { font-family: 'Orbitron', sans-serif; font-size: 32px; font-weight: 900; color: var(--gold); }
        
        .progress-bar { height: 6px; background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #333; margin: 8px auto; width: 80%; }
        #level-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--fire)); width: 0%; transition: 0.4s; }

        /* MAIN CONTENT */
        .screen { flex-grow: 1; display: none; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; padding-bottom: 120px; }
        .active-screen { display: flex; }

        /* COIN */
        #main-coin { width: 220px; cursor: pointer; transition: transform 0.05s; margin: 20px 0; }
        #main-coin:active { transform: scale(0.9); }
        .skin-neon { filter: drop-shadow(0 0 20px var(--blue)) hue-rotate(180deg); }
        .skin-fire { filter: drop-shadow(0 0 20px var(--fire)) saturate(2); }

        /* UI ELEMENTS */
        .card { background: var(--glass); padding: 15px; border-radius: 18px; width: 100%; margin-bottom: 10px; display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        .btn-act { background: var(--gold); color: black; border: none; padding: 12px 20px; border-radius: 10px; font-weight: 900; cursor: pointer; font-family: 'Orbitron'; font-size: 11px; }
        
        .nav { position: fixed; bottom: 0; width: 100%; background: rgba(10,10,10,0.98); display: none; padding: 12px 0; border-top: 1px solid #222; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; color: #444; font-size: 9px; font-weight: bold; }
        .nav-item.active { color: var(--gold); }
        .nav-item span { display: block; font-size: 22px; margin-bottom: 3px; }

        /* SLOT & BOSS */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 5000; display: none; align-items: center; justify-content: center; }
        .slot-box { width: 60px; height: 80px; background: #000; border: 2px solid #333; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 30px; margin: 5px; }

        @keyframes pop { 0% { opacity:1; transform:translateY(0); } 100% { opacity:0; transform:translateY(-100px); } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1 style="font-family:'Orbitron'; color:var(--gold); font-size:24px;">ESSE STUDIO</h1>
            <p style="font-size:10px; color:#888; margin-top:5px;">Galaktik Madenciliğe Giriş Yap</p>
            <input type="text" id="username-input" class="login-input" placeholder="Kullanıcı Adı..." maxlength="15">
            <button class="btn-act" style="width:100%; font-size:14px;" onclick="login()">BAŞLAT</button>
            <p id="login-status" style="font-size:10px; margin-top:15px; color:var(--blue);"></p>
        </div>
    </div>

    <div id="boss-ui" class="modal" style="flex-direction: column;">
        <h1 style="color:var(--fire); font-family:'Orbitron';">BOSS UYARISI!</h1>
        <img src="https://cdn-icons-png.flaticon.com/512/3037/3037134.png" width="180" onclick="hitBoss()" style="filter:drop-shadow(0 0 30px red); margin:30px;">
        <div class="progress-bar" style="width:70%; border-color:red;"><div id="boss-hp" style="width:100%; background:red; height:100%;"></div></div>
        <p id="boss-timer" style="font-family:'Orbitron'; margin-top:10px;">30s</p>
    </div>

    <div class="header" id="main-header">
        <div style="font-size:10px; color:var(--blue); margin-bottom:5px;">PİLOT: <span id="display-name">---</span></div>
        <div id="balance">0</div>
        <div class="progress-bar"><div id="level-fill"></div></div>
        <div style="display:flex; justify-content:space-between; width:80%; margin:auto; font-size:9px; color:#555;">
            <span>LEVEL <span id="lv-val">1</span></span>
            <span>PASİF: <span id="passive-val">0</span>/s</span>
        </div>
    </div>

    <div id="game-s" class="screen">
        <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center;">
            <div id="combo-text" style="font-family:'Orbitron'; color:var(--blue); font-size:20px; opacity:0;">X1.0</div>
            <img src="https://cdn-icons-png.flaticon.com/512/2529/2529396.png" id="main-coin" ontouchstart="handleTouch(event)">
            <div style="width:180px;">
                <div style="display:flex; justify-content:space-between; font-size:9px; margin-bottom:4px;"><span>ENERJİ</span><span id="en-text">500/500</span></div>
                <div class="progress-bar" style="width:100%; margin:0;"><div id="en-fill" style="width:100%; background:var(--gold); height:100%;"></div></div>
            </div>
        </div>
    </div>

    <div id="market-s" class="screen">
        <h3 style="font-family:'Orbitron'; color:var(--blue); margin-bottom:20px;">BORSA & EKİPMAN</h3>
        <div class="card">
            <div style="flex:1"><b>Auto Miner V1</b><br><small>+5/s Pasif Gelir</small></div>
            <button class="btn-act" onclick="buyAsset(5000, 5)">5,000 AL</button>
        </div>
        <div class="card">
            <div style="flex:1"><b>Neon Görünüm</b><br><small>Mavi Işıltı</small></div>
            <button class="btn-act" onclick="buySkin('skin-neon', 15000)">15,000 AL</button>
        </div>
    </div>

    <div id="task-s" class="screen">
        <h3 style="font-family:'Orbitron'; color:var(--boss); margin-bottom:20px;">GÖREVLER</h3>
        <div class="card">
            <div style="flex:1"><b>Arkadaş Daveti</b><br><small>Kişi başı 50k ESSE</small></div>
            <button class="btn-act" onclick="inviteFriend()">DAVET</button>
        </div>
        <div id="quest-list" style="width:100%;"></div>
    </div>

    <div id="casino-s" class="screen">
        <h3 style="font-family:'Orbitron'; color:var(--fire); margin-bottom:20px;">ŞANS MERKEZİ</h3>
        <div style="display:flex; margin-bottom:20px;">
            <div class="slot-box" id="s1">❓</div><div class="slot-box" id="s2">❓</div><div class="slot-box" id="s3">❓</div>
        </div>
        <button class="btn-act" onclick="playSlot()" style="width:200px;">SLOT ÇEVİR (5k)</button>
        <div style="margin-top:40px; text-align:center;">
            <canvas id="wheel" width="180" height="180" style="border-radius:50%; border:5px solid #222;"></canvas><br>
            <button class="btn-act" onclick="spinWheel()" style="margin-top:15px;">ÇARK (2k)</button>
        </div>
    </div>

    <nav class="nav" id="main-nav">
        <div class="nav-item active" onclick="sh(this,'game-s')"><span>⛏️</span>MADEN</div>
        <div class="nav-item" onclick="sh(this,'market-s')"><span>🚀</span>MARKET</div>
        <div class="nav-item" onclick="sh(this,'task-s')"><span>📋</span>GÖREV</div>
        <div class="nav-item" onclick="sh(this,'casino-s')"><span>🎰</span>ŞANS</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // FIREBASE - BURAYA KENDİ LİNKİNİ YAZ
        const DATABASE_URL = "https://esseoyunu-default-rtdb.firebaseio.com/"; 

        let currentUser = "";
        let b = 0, a = 0, lv = 1, e = 500, clicks = 0, skin = "", quests = [], combo = 1.0;

        // GİRİŞ FONKSİYONU
        async function login() {
            const input = document.getElementById('username-input').value.trim().toLowerCase();
            if(input.length < 3) return alert("Kullanıcı adı en az 3 harf olmalı!");
            
            document.getElementById('login-status').innerText = "Veriler senkronize ediliyor...";
            currentUser = input;

            try {
                const res = await fetch(`${DATABASE_URL}users/${currentUser}.json`);
                const d = await res.json();
                
                if(d) {
                    // Kayıtlı Kullanıcı
                    b = d.b || 0; a = d.a || 0; lv = d.lv || 1;
                    e = d.e || 500; skin = d.skin || ""; quests = d.quests || [];
                } else {
                    // Yeni Kayıt
                    await fetch(`${DATABASE_URL}users/${currentUser}.json`, {
                        method: 'PUT',
                        body: JSON.stringify({ b:0, a:0, lv:1, e:500, skin:"", quests:[] })
                    });
                }

                startApp();
            } catch(err) {
                alert("Bağlantı hatası! Lütfen internetinizi kontrol edin.");
            }
        }

        function startApp() {
            document.getElementById('login-screen').style.display = "none";
            document.getElementById('main-header').style.display = "block";
            document.getElementById('main-nav').style.display = "flex";
            document.getElementById('game-s').classList.add('active-screen');
            document.getElementById('display-name').innerText = currentUser.toUpperCase();
            
            if(skin) document.getElementById('main-coin').className = skin;
            initWheel();
            renderQuests();
            updateUI();
            
            // Döngüleri Başlat
            setInterval(gameLoop, 100);
            setInterval(saveCloud, 15000); // 15 saniyede bir otomatik kayıt
        }

        async function saveCloud() {
            if(!currentUser) return;
            const data = { b, a, lv, e, clicks, skin, quests, lastSeen: Date.now() };
            fetch(`${DATABASE_URL}users/${currentUser}.json`, { method: 'PUT', body: JSON.stringify(data) });
        }

        function handleTouch(ev) {
            ev.preventDefault();
            if(e >= 2) {
                clicks++; e -= 2;
                let gain = lv * combo;
                b += gain;
                combo = Math.min(combo + 0.02, 4.0);
                createPop(ev.touches[0].pageX, ev.touches[0].pageY, "+" + Math.floor(gain));
                tg.HapticFeedback.impactOccurred('light');
                updateUI();
            }
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(b).toLocaleString();
            document.getElementById('passive-val').innerText = a.toFixed(1);
            document.getElementById('lv-val').innerText = lv;
            document.getElementById('en-text').innerText = Math.floor(e) + "/500";
            document.getElementById('en-fill').style.width = (e/5) + "%";
            
            let nxt = 15000 * Math.pow(lv, 2.2);
            document.getElementById('level-fill').style.width = Math.min((b/nxt)*100, 100) + "%";
            if(b >= nxt) { lv++; tg.HapticFeedback.notificationOccurred('success'); saveCloud(); }
            
            let ct = document.getElementById('combo-text');
            ct.innerText = "X" + combo.toFixed(1);
            ct.style.opacity = combo > 1.1 ? 1 : 0;
        }

        function buyAsset(cost, inc) { if(b >= cost) { b -= cost; a += inc; updateUI(); saveCloud(); } }
        function buySkin(s, cost) { if(b >= cost) { b -= cost; skin = s; document.getElementById('main-coin').className = s; updateUI(); saveCloud(); } }

        function playSlot() {
            if(b < 5000) return; b -= 5000;
            const s = ['💎', '💰', '🍒', '🚀'];
            let r = [s[Math.floor(Math.random()*4)], s[Math.floor(Math.random()*4)], s[Math.floor(Math.random()*4)]];
            document.getElementById('s1').innerText = r[0]; document.getElementById('s2').innerText = r[1]; document.getElementById('s3').innerText = r[2];
            if(r[0]==r[1] && r[1]==r[2]) { b += 100000; alert("JACKPOT! +100k"); }
            updateUI();
        }

        function initWheel() {
            const ctx = document.getElementById('wheel').getContext('2d');
            for(let i=0; i<8; i++) {
                ctx.beginPath(); ctx.fillStyle = i%2==0?"#111":varColor('--gold');
                ctx.moveTo(90,90); ctx.arc(90,90,90, i*(Math.PI/4), (i+1)*(Math.PI/4)); ctx.fill();
            }
        }
        function varColor(n) { return "#ffcf25"; }

        function spinWheel() {
            if(b < 2000) return; b -= 2000;
            document.getElementById('wheel').style.transition = "4s cubic-bezier(0.1,0,0.1,1)";
            document.getElementById('wheel').style.transform = `rotate(${2000 + Math.random()*360}deg)`;
            setTimeout(() => { b += 10000; updateUI(); saveCloud(); }, 4000);
        }

        function hitBoss() {
            let hp = document.getElementById('boss-hp');
            let w = parseFloat(hp.style.width);
            hp.style.width = (w - 5) + "%";
            if(w <= 5) { b += 50000; document.getElementById('boss-ui').style.display="none"; updateUI(); saveCloud(); }
        }

        function renderQuests() {
            const qs = [{id:1, t:"Başlangıç Hediyesi", r:1000}];
            let h = "";
            qs.forEach(q => {
                const done = quests.includes(q.id);
                h += `<div class="card"><div style="flex:1"><b>${q.t}</b><br><small>+${q.r}</small></div>
                <button class="btn-act" onclick="claimQ(${q.id},${q.r})" ${done?'disabled':''}>${done?'OK':'AL'}</button></div>`;
            });
            document.getElementById('quest-list').innerHTML = h;
        }
        function claimQ(id, r) { if(!quests.includes(id)) { quests.push(id); b += r; renderQuests(); updateUI(); saveCloud(); } }
        function inviteFriend() { window.open(`https://t.me/share/url?url=https://t.me/EsseStudioBot&text=ESSE Madenciliğe katıl!`); }

        function createPop(x, y, txt) {
            let p = document.createElement('div'); p.innerText = txt;
            p.style.cssText = `position:fixed; left:${x}px; top:${y}px; color:var(--gold); font-weight:bold; animation: pop 0.8s forwards; z-index:9999;`;
            document.body.appendChild(p); setTimeout(() => p.remove(), 800);
        }

        function sh(el, id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active-screen'); el.classList.add('active');
        }

        function gameLoop() {
            b += a/10;
            if(e < 500) e += 0.3;
            combo = Math.max(1.0, combo - 0.005);
            updateUI();
        }

        // Rastgele Boss
        setInterval(() => {
            if(currentUser && Math.random() > 0.98) {
                document.getElementById('boss-ui').style.display = "flex";
                document.getElementById('boss-hp').style.width = "100%";
            }
        }, 60000);

    </script>
</body>
</html>
