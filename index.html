<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESSE STUDIO: Cloud Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffcf25; --bg: #050505; --fire: #ff4500; --green: #00ff88; --blue: #00d9ff; --boss: #cc00ff; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; user-select: none; touch-action: manipulation; }
        body { background: radial-gradient(circle at center, #111 0%, #000 100%); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* PROFIL ALANI */
        .header { text-align: center; padding: 10px; background: rgba(0,0,0,0.8); border-bottom: 2px solid var(--gold); z-index: 100; }
        #user-info { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 5px; }
        #user-img { width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--gold); }
        #user-name { font-size: 11px; font-weight: bold; color: #fff; }

        #balance { font-family: 'Orbitron', sans-serif; font-size: 30px; font-weight: 900; color: var(--gold); text-shadow: 0 0 15px rgba(255,207,37,0.4); }
        .progress-bar { height: 6px; background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #333; margin: 5px auto; width: 80%; }
        #level-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--fire)); width: 0%; transition: 0.4s; }

        /* COIN */
        #main-coin { width: 200px; cursor: pointer; transition: transform 0.05s; margin: 20px 0; }
        #main-coin:active { transform: scale(0.9); }
        .skin-neon { filter: drop-shadow(0 0 20px var(--blue)) hue-rotate(180deg); }
        .skin-fire { filter: drop-shadow(0 0 20px var(--fire)) saturate(2); }

        /* SCREENS & CARDS */
        .screen { flex-grow: 1; display: none; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; padding-bottom: 100px; }
        .active-screen { display: flex; animation: fadeIn 0.3s ease; }
        .card { background: var(--glass); padding: 12px; border-radius: 15px; width: 100%; margin-bottom: 8px; display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        .btn-act { background: var(--gold); color: black; border: none; padding: 8px 12px; border-radius: 8px; font-weight: 900; cursor: pointer; font-size: 10px; font-family: 'Orbitron'; }

        /* NAV */
        .nav { position: fixed; bottom: 0; width: 100%; background: rgba(10,10,10,0.95); display: flex; padding: 10px 0; border-top: 1px solid #222; }
        .nav-item { flex: 1; text-align: center; color: #444; font-size: 9px; font-weight: bold; }
        .nav-item.active { color: var(--gold); }
        .nav-item span { display: block; font-size: 20px; }

        @keyframes pop { 0% { opacity:1; transform:translateY(0); } 100% { opacity:0; transform:translateY(-80px); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header">
        <div id="user-info">
            <img id="user-img" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
            <span id="user-name">Giriş Yapılıyor...</span>
        </div>
        <div id="balance">0</div>
        <div class="progress-bar"><div id="level-fill"></div></div>
        <div style="font-size:9px; color:#555; font-weight:bold;">LEVEL <span id="lv-val">1</span> | PASİF: <span id="passive-val">0</span>/s</div>
    </div>

    <div id="game-s" class="screen active-screen">
        <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center;">
            <img src="https://cdn-icons-png.flaticon.com/512/2529/2529396.png" id="main-coin" ontouchstart="clickCoin(event)">
            <div style="width:180px;">
                <div style="display:flex; justify-content:space-between; font-size:9px; margin-bottom:3px;"><span>ENERJİ</span><span id="en-text">500/500</span></div>
                <div class="progress-bar" style="width:100%; margin:0;"><div id="en-fill" style="width:100%; background:var(--gold); height:100%;"></div></div>
            </div>
        </div>
    </div>

    <div id="market-s" class="screen">
        <h3 style="font-family:'Orbitron'; color:var(--blue); margin-bottom:15px;">MARKET & BULUT</h3>
        <div class="card" style="border-left:4px solid var(--green);">
            <div style="flex:1"><b>Auto Bot</b><br><small>+2/s Gelir</small></div>
            <button class="btn-act" onclick="buyAsset(1000, 2)">1,000 AL</button>
        </div>
        <div class="card" style="border-left:4px solid var(--fire);">
            <div style="flex:1"><b>Ateş Görünümü</b><br><small>Kırmızı Efekt</small></div>
            <button class="btn-act" onclick="buySkin('skin-fire', 5000)">5,000 AL</button>
        </div>
        <p style="font-size:9px; color:#555; margin-top:20px;">VERİLERİNİZ TELEGRAM ID İLE BULUTA BAĞLIDIR.</p>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="sh(this,'game-s')"><span>⛏️</span>OYUN</div>
        <div class="nav-item" onclick="sh(this,'market-s')"><span>🚀</span>MARKET</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // FIREBASE AYARI
        const DATABASE_URL = "https://console.firebase.google.com/u/2/project/esseoyunu/database/esseoyunu-default-rtdb/data/~2F"; // Senin linkin
        const user = tg.initDataUnsafe?.user;
        const userId = user ? user.id : "guest";

        // OYUN DEĞİŞKENLERİ
        let b = 0; let a = 0; let lv = 1; let e = 500; let skin = "";

        // GİRİŞ VE VERİ ÇEKME
        async function initGame() {
            if (user) {
                document.getElementById('user-name').innerText = user.first_name;
                if (user.photo_url) document.getElementById('user-img').src = user.photo_url;
            } else {
                document.getElementById('user-name').innerText = "Misafir Modu";
            }

            // Firebase'den verileri getir
            try {
                const res = await fetch(`${DATABASE_URL}users/${userId}.json`);
                const data = await res.json();
                if (data) {
                    b = data.b || 0; a = data.a || 0;
                    lv = data.lv || 1; skin = data.skin || "";
                    if(skin) document.getElementById('main-coin').className = skin;
                    updateUI();
                }
            } catch (e) { console.log("Veri çekilemedi, yeni hesap açılıyor."); }
        }

        // VERİ KAYDETME (BULUTA)
        async function saveToCloud() {
            if (userId === "guest") return;
            const data = { b, a, lv, skin, lastUpdate: Date.now() };
            try {
                await fetch(`${DATABASE_URL}users/${userId}.json`, {
                    method: 'PUT',
                    body: JSON.stringify(data)
                });
            } catch (e) { console.error("Cloud Save Error"); }
        }

        function clickCoin(ev) {
            ev.preventDefault();
            if (e >= 2) {
                b += (1 * lv); e -= 2;
                createPop(ev.touches[0].pageX, ev.touches[0].pageY, "+" + lv);
                tg.HapticFeedback.impactOccurred('light');
                updateUI();
            }
        }

        function buyAsset(cost, income) {
            if (b >= cost) { b -= cost; a += income; updateUI(); saveToCloud(); }
        }

        function buySkin(s, cost) {
            if (b >= cost) { b -= cost; skin = s; document.getElementById('main-coin').className = s; updateUI(); saveToCloud(); }
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(b).toLocaleString();
            document.getElementById('passive-val').innerText = a.toFixed(1);
            document.getElementById('lv-val').innerText = lv;
            document.getElementById('en-text').innerText = Math.floor(e) + "/500";
            document.getElementById('en-fill').style.width = (e / 5) + "%";
            let nxt = 10000 * Math.pow(lv, 2.5);
            document.getElementById('level-fill').style.width = Math.min((b / nxt) * 100, 100) + "%";
            if (b >= nxt) { lv++; tg.HapticFeedback.notificationOccurred('success'); }
        }

        function createPop(x, y, txt) {
            const p = document.createElement('div');
            p.innerText = txt;
            p.style.cssText = `position:fixed; left:${x}px; top:${y}px; color:var(--gold); font-weight:bold; pointer-events:none; animation: pop 0.6s forwards; z-index:1000;`;
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);
        }

        function sh(el, id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active-screen');
            el.classList.add('active');
        }

        // DÖNGÜLER
        setInterval(() => {
            b += a / 10;
            if (e < 500) e += 0.5;
            updateUI();
        }, 100);

        // Her 30 saniyede bir buluta otomatik yedekle
        setInterval(saveToCloud, 30000);

        initGame();
    </script>
</body>
</html>
