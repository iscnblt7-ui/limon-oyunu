<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Money Clicker: God Mode</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffcf25; --fire: #ff4500; --bg: #050505; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; user-select: none; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER */
        .header { padding: 20px; text-align: center; }
        #balance { font-size: 55px; font-weight: 900; color: var(--gold); text-shadow: 0 0 20px rgba(255,207,37,0.4); }
        #combo-badge { font-size: 18px; color: var(--fire); font-weight: 900; opacity: 0; transition: 0.2s; }

        /* SCREENS */
        .screen { flex-grow: 1; display: none; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; padding-bottom: 120px; }
        .active-screen { display: flex; animation: slideUp 0.3s ease-out; }

        /* CLICKER */
        .coin-wrap { position: relative; width: 280px; height: 280px; display: flex; align-items: center; justify-content: center; margin: 30px 0; }
        #main-coin { width: 220px; filter: drop-shadow(0 0 30px rgba(255,207,37,0.2)); transition: transform 0.05s; cursor: pointer; }
        #main-coin:active { transform: scale(0.9); }

        /* CARDS */
        .card { background: #111; border: 1px solid #222; border-radius: 20px; padding: 15px; width: 100%; margin-bottom: 12px; display: flex; align-items: center; }
        .card-icon { font-size: 24px; margin-right: 15px; background: #1a1a1a; padding: 10px; border-radius: 12px; }
        .card-content { flex-grow: 1; }
        .btn-buy { background: var(--gold); color: black; border: none; padding: 10px 15px; border-radius: 12px; font-weight: bold; }

        /* LEADERBOARD */
        .leader-item { display: flex; justify-content: space-between; width: 100%; padding: 12px; border-bottom: 1px solid #222; font-size: 14px; }
        .rank-num { color: var(--gold); font-weight: bold; width: 30px; }

        /* NAVIGATION */
        .nav { position: fixed; bottom: 15px; width: 92%; left: 4%; background: rgba(15,15,15,0.9); backdrop-filter: blur(15px); border-radius: 20px; display: flex; padding: 10px; border: 1px solid #333; }
        .nav-item { flex: 1; text-align: center; color: #555; font-size: 10px; transition: 0.3s; cursor: pointer; }
        .nav-item.active { color: var(--gold); }
        .nav-item span { font-size: 22px; display: block; }

        /* PARTICLES & COMBO */
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .float-val { position: absolute; font-weight: 900; color: white; pointer-events: none; animation: floatUp 0.6s forwards; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
        
        .energy-box { width: 80%; margin-top: 20px; }
        .bar-outer { width: 100%; height: 10px; background: #1a1a1a; border-radius: 5px; margin-top: 8px; overflow: hidden; }
        #bar-inner { width: 100%; height: 100%; background: linear-gradient(90deg, var(--gold), #ff8c00); }
    </style>
</head>
<body>

    <div class="header">
        <div id="balance">0</div>
        <div id="combo-badge">COMBO X1</div>
    </div>

    <div id="game-s" class="screen active-screen">
        <div class="coin-wrap">
            <img src="https://cdn-icons-png.flaticon.com/512/2529/2529396.png" id="main-coin">
        </div>
        <div class="energy-box">
            <div style="display:flex; justify-content:space-between; font-size:11px">
                <span>⚡ GÜÇ</span>
                <span id="en-stat">500 / 500</span>
            </div>
            <div class="bar-outer"><div id="bar-inner"></div></div>
        </div>
    </div>

    <div id="market-s" class="screen">
        <h2 style="margin-bottom:20px">Market</h2>
        <div class="card">
            <div class="card-icon">⚡</div>
            <div class="card-content"><h4>Multi-Tık</h4><p id="mt-p">Maliyet: 200</p></div>
            <button class="btn-buy" onclick="buy('mt')">GELİŞTİR</button>
        </div>
        <div class="card">
            <div class="card-icon">🤖</div>
            <div class="card-content"><h4>Oto Madenci</h4><p id="au-p">Maliyet: 1000</p></div>
            <button class="btn-buy" onclick="buy('au')">SATIN AL</button>
        </div>
    </div>

    <div id="task-s" class="screen">
        <h2>Görevler</h2>
        <div class="card" style="margin-top:20px">
            <div class="card-icon">📺</div>
            <div class="card-content"><h4>YouTube</h4><p>Abone Ol +50.000</p></div>
            <button class="btn-buy" onclick="task('yt')">YAP</button>
        </div>
        <div class="card">
            <div class="card-icon">📸</div>
            <div class="card-content"><h4>Instagram</h4><p>Takip Et +30.000</p></div>
            <button class="btn-buy" onclick="task('ig')">YAP</button>
        </div>
    </div>

    <div id="rank-s" class="screen">
        <h2>Dünya Sıralaması</h2>
        <div style="width:100%; margin-top:20px">
            <div class="leader-item"><span class="rank-num">1.</span> <span>CryptoKing</span> <span>99.2M</span></div>
            <div class="leader-item"><span class="rank-num">2.</span> <span>ElonMusk_v2</span> <span>85.1M</span></div>
            <div class="leader-item"><span class="rank-num">3.</span> <span>SeninAdın</span> <span id="my-rank-val">0</span></div>
            <div class="leader-item" style="opacity:0.5"><span class="rank-num">4.</span> <span>Limoncu</span> <span>12.5K</span></div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="nav(this,'game-s')"><span>🏠</span>Ana Sayfa</div>
        <div class="nav-item" onclick="nav(this,'market-s')"><span>⛏️</span>Market</div>
        <div class="nav-item" onclick="nav(this,'task-s')"><span>📋</span>Görevler</div>
        <div class="nav-item" onclick="nav(this,'rank-s')"><span>🏆</span>Sıralama</div>
    </div>

    <audio id="click-sound" src="https://www.soundjay.com/buttons/sounds/button-37.mp3"></audio>

    <script>
        let bal = parseFloat(localStorage.getItem('bal')) || 0;
        let en = parseInt(localStorage.getItem('en')) || 500;
        let mt = parseInt(localStorage.getItem('mt')) || 1;
        let au = parseFloat(localStorage.getItem('au')) || 0;
        let combo = 0;
        let lastT = 0;

        function update() {
            document.getElementById('balance').innerText = Math.floor(bal).toLocaleString();
            document.getElementById('en-stat').innerText = `${en} / 500`;
            document.getElementById('bar-inner').style.width = (en/5) + "%";
            document.getElementById('mt-p').innerText = `Maliyet: ${mt*200}`;
            document.getElementById('au-p').innerText = `Maliyet: ${(au+1)*1000}`;
            document.getElementById('my-rank-val').innerText = Math.floor(bal).toLocaleString();
            save();
        }

        document.getElementById('main-coin').onclick = (e) => {
            if(en >= mt) {
                let now = Date.now();
                if(now - lastT < 300) combo++; else combo = 1;
                lastT = now;

                let multiplier = combo > 10 ? 2 : 1;
                let gain = mt * multiplier;
                
                bal += gain; en -= mt;
                
                if(combo > 5) {
                    document.getElementById('combo-badge').style.opacity = 1;
                    document.getElementById('combo-badge').innerText = `COMBO X${multiplier}`;
                } else {
                    document.getElementById('combo-badge').style.opacity = 0;
                }

                // Efekt ve Ses
                spawn(e.clientX, e.clientY, "+"+gain);
                document.getElementById('click-sound').currentTime = 0;
                document.getElementById('click-sound').play().catch(()=>{});
                
                if(window.Telegram.WebApp.HapticFeedback) window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
                update();
            }
        };

        function spawn(x, y, val) {
            const d = document.createElement('div');
            d.innerText = val; d.className = 'float-val';
            d.style.left = x + 'px'; d.style.top = y + 'px';
            document.body.appendChild(d); setTimeout(()=>d.remove(), 600);
        }

        function buy(type) {
            if(type === 'mt' && bal >= mt*200) { bal -= mt*200; mt++; }
            if(type === 'au' && bal >= (au+1)*1000) { bal -= (auto+1)*1000; au += 0.5; }
            update();
        }

        function task(t) {
            alert("Görev Tamamlandı! +30,000");
            bal += 30000; update();
        }

        function nav(el, id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active-screen');
            el.classList.add('active');
        }

        function save() {
            localStorage.setItem('bal', bal); localStorage.setItem('en', en);
            localStorage.setItem('mt', mt); localStorage.setItem('au', au);
        }

        setInterval(() => { bal += (au/10); if(en < 500) en++; update(); }, 100);
        window.Telegram.WebApp.expand();
        update();
    </script>
</body>
</html>
