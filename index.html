<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESSE STUDIO: Pro Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffcf25; --bg: #050505; --fire: #ff4500; --green: #2ecc71; --blue: #0088cc; --purple: #9b59b6; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; user-select: none; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* ARKA PLAN PARILTI */
        .glow { position: fixed; top: 50%; left: 50%; width: 300px; height: 300px; background: var(--gold); filter: blur(150px); opacity: 0.1; transform: translate(-50%, -50%); pointer-events: none; z-index: 0; }

        /* HEADER */
        .header { text-align: center; padding: 15px; border-bottom: 1px solid #222; background: rgba(0,0,0,0.5); z-index: 10; }
        #balance { font-size: 45px; font-weight: 900; color: var(--gold); text-shadow: 0 0 20px rgba(255,207,37,0.5); }
        #passive-inc { font-size: 13px; color: var(--green); font-weight: bold; margin-top: -5px; }

        /* PROGRESS BARS */
        .progress-bar { height: 10px; background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #333; margin: 8px auto; width: 85%; }
        #level-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--fire)); transition: 0.5s; }
        #en-fill { height: 100%; background: linear-gradient(90deg, #3498db, #2980b9); transition: 0.2s; }

        /* SCREENS */
        .screen { flex-grow: 1; display: none; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; padding-bottom: 140px; z-index: 5; }
        .active-screen { display: flex; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* CARDS */
        .card { background: rgba(25, 25, 25, 0.8); backdrop-filter: blur(5px); padding: 15px; border-radius: 20px; width: 100%; margin-bottom: 12px; display: flex; align-items: center; border: 1px solid #333; }
        .btn-act { background: var(--gold); border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; color: black; font-size: 14px; box-shadow: 0 4px 0 #b7950b; }
        .btn-act:active { transform: translateY(2px); box-shadow: none; }
        .btn-act:disabled { background: #444; color: #777; box-shadow: none; }

        /* COIN */
        #main-coin { width: 240px; cursor: pointer; transition: transform 0.1s; filter: drop-shadow(0 0 30px rgba(0,0,0,0.5)); }
        #main-coin:active { transform: scale(0.88); }

        /* NAV */
        .nav { position: fixed; bottom: 20px; width: 92%; left: 4%; background: rgba(20,20,20,0.95); border-radius: 25px; display: flex; padding: 12px; z-index: 100; border: 1px solid #444; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .nav-item { flex: 1; text-align: center; color: #666; font-size: 10px; font-weight: bold; }
        .nav-item.active { color: var(--gold); }
        .nav-item span { display: block; font-size: 24px; margin-bottom: 2px; }

        /* FLOATING TEXT */
        .floating-text { position: absolute; color: white; font-weight: 900; font-size: 30px; pointer-events: none; animation: floatUp 0.6s ease-out forwards; z-index: 5000; text-shadow: 0 0 10px var(--gold); }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-120px); } }

        /* SKIN SELECTION */
        .skin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .skin-card { background: #111; padding: 15px; border-radius: 15px; text-align: center; border: 2px solid transparent; }
        .skin-card.owned { border-color: var(--gold); }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="header">
        <div id="balance">0</div>
        <div id="passive-inc">+0 / saniye</div>
        <div class="progress-bar"><div id="level-fill"></div></div>
        <p id="lv-text" style="font-size:10px; color:#777;">LEVEL 1</p>
    </div>

    <div id="game-s" class="screen active-screen">
        <div style="flex-grow:1; display:flex; justify-content:center; align-items:center;">
            <img src="https://cdn-icons-png.flaticon.com/512/2529/2529396.png" id="main-coin" onclick="clickCoin(event)">
        </div>
        <div style="width:90%;">
            <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:5px;">
                <b>ENERJİ</b><b id="en-text">500/500</b>
            </div>
            <div class="progress-bar" style="height:12px; width:100%;"><div id="en-fill" style="width:100%;"></div></div>
        </div>
    </div>

    <div id="market-s" class="screen">
        <h3 style="margin-bottom:20px; color:var(--gold);">UPGRADES</h3>
        <div class="card">🚀 <div style="flex:1; margin-left:15px"><h4>Tık Gücü</h4><p id="c-click">Level 1</p></div><button class="btn-act" onclick="upgrade('click')">YÜKSELT</button></div>
        <div class="card">🔋 <div style="flex:1; margin-left:15px"><h4>Kapasite</h4><p id="c-energy">500</p></div><button class="btn-act" onclick="upgrade('energy')">YÜKSELT</button></div>
        <h3 style="margin:20px 0; color:var(--purple);">GÖRÜNÜMLER (SKINS)</h3>
        <div class="skin-grid">
            <div class="skin-card owned" onclick="changeSkin('https://cdn-icons-png.flaticon.com/512/2529/2529396.png')">
                <img src="https://cdn-icons-png.flaticon.com/512/2529/2529396.png" width="50"><br>Klasik
            </div>
            <div class="skin-card" id="skin-diamond" onclick="buySkin('diamond', 50000, 'https://cdn-icons-png.flaticon.com/512/12513/12513106.png')">
                <img src="https://cdn-icons-png.flaticon.com/512/12513/12513106.png" width="50"><br>Elmas (50K)
            </div>
        </div>
    </div>

    <div id="task-s" class="screen">
        <h3 style="color:var(--gold)">ŞANS MERKEZİ</h3>
        <canvas id="wheel" width="280" height="280" style="margin:20px 0; transition:5s cubic-bezier(0.15,0,0.15,1);"></canvas>
        <button class="btn-act" id="wheel-btn" onclick="spinWheel()">ÇARK-I ESSE (2.000)</button>
        <div style="margin: 30px 0; width: 100%; height: 1px; background: #333;"></div>
        <button class="btn-act" onclick="claimDaily()" id="daily-btn" style="background:var(--green); width:200px;">GÜNLÜK ÖDÜLÜ AL</button>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="sh(this,'game-s')"><span>💰</span>TAP</div>
        <div class="nav-item" onclick="sh(this,'market-s')"><span>⚡</span>SHOP</div>
        <div class="nav-item" onclick="sh(this,'task-s')"><span>🎡</span>LUCK</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        
        let b = parseFloat(localStorage.getItem('b')) || 0;
        let e = parseInt(localStorage.getItem('e')) || 500;
        let maxE = parseInt(localStorage.getItem('maxE')) || 500;
        let clickLv = parseInt(localStorage.getItem('clickLv')) || 1;
        let lv = parseInt(localStorage.getItem('lv')) || 1;
        let a = parseFloat(localStorage.getItem('a')) || 0;
        let lastDaily = localStorage.getItem('lastDaily') || 0;
        let currentSkin = localStorage.getItem('currentSkin') || 'https://cdn-icons-png.flaticon.com/512/2529/2529396.png';
        let ownedSkins = JSON.parse(localStorage.getItem('ownedSkins')) || ['classic'];

        function up() {
            let nxt = 5000 * Math.pow(lv, 2);
            document.getElementById('balance').innerText = Math.floor(b).toLocaleString();
            document.getElementById('passive-inc').innerText = `+${a.toFixed(1)} / sn`;
            document.getElementById('en-fill').style.width = (e / maxE * 100) + "%";
            document.getElementById('en-text').innerText = `${e}/${maxE}`;
            document.getElementById('level-fill').style.width = Math.min((b/nxt)*100, 100) + "%";
            document.getElementById('lv-text').innerText = `LEVEL ${lv} - HEDEF: ${nxt.toLocaleString()}`;
            document.getElementById('main-coin').src = currentSkin;
            
            document.getElementById('c-click').innerText = `Level ${clickLv}`;
            document.getElementById('c-energy').innerText = `${maxE}`;
            save();
        }

        function clickCoin(ev) {
            if(e >= clickLv) {
                b += clickLv; e -= clickLv;
                tg.HapticFeedback.impactOccurred('medium');
                const ft = document.createElement('div');
                ft.className = 'floating-text'; ft.innerText = `+${clickLv}`;
                ft.style.left = `${ev.clientX - 20}px`; ft.style.top = `${ev.clientY - 40}px`;
                document.body.appendChild(ft);
                setTimeout(() => ft.remove(), 600);
                up();
            } else { tg.HapticFeedback.notificationOccurred('error'); }
        }

        function upgrade(type) {
            let cost = type === 'click' ? clickLv * 1000 : maxE * 2;
            if(b >= cost) {
                b -= cost;
                if(type === 'click') clickLv++; else maxE += 100;
                tg.HapticFeedback.notificationOccurred('success');
                up();
            }
        }

        function buySkin(id, cost, url) {
            if(ownedSkins.includes(id)) { currentSkin = url; up(); return; }
            if(b >= cost) {
                b -= cost; ownedSkins.push(id); currentSkin = url;
                localStorage.setItem('ownedSkins', JSON.stringify(ownedSkins));
                alert("Yeni Görünüm Açıldı!"); up();
            }
        }

        function claimDaily() {
            let now = Date.now();
            if(now - lastDaily > 86400000) {
                b += 10000; lastDaily = now;
                localStorage.setItem('lastDaily', lastDaily);
                alert("10.000 Altın Alındı!"); up();
            } else { alert("Yarın tekrar gel!"); }
        }

        // ÇARK
        const rew = ["500", "1000", "2000", "İFLAS", "5000", "100", "10000", "0"];
        let rot = 0;
        function spinWheel() {
            if(b < 2000) return;
            b -= 2000; let add = (360 * 5) + Math.floor(Math.random() * 360);
            rot += add; document.getElementById('wheel').style.transform = `rotate(${rot}deg)`;
            setTimeout(() => {
                let idx = Math.floor(((360 - (rot % 360) + 22.5) % 360) / 45);
                let res = rew[idx % 8];
                if(res === "İFLAS") b = 0; else b += parseInt(res);
                up();
            }, 5100);
        }

        function drawW() {
            const c = document.getElementById('wheel'); const x = c.getContext('2d');
            const cols = ["#f1c40f","#e67e22","#e74c3c","#222","#9b59b6","#3498db","#2ecc71","#1abc9c"];
            rew.forEach((t, i) => {
                x.beginPath(); x.fillStyle = cols[i]; x.moveTo(140,140);
                x.arc(140,140,140, i*(Math.PI/4), (i+1)*(Math.PI/4)); x.fill();
                x.fillStyle="white"; x.save(); x.translate(140,140); x.rotate(i*(Math.PI/4)+Math.PI/8);
                x.fillText(t, 70, 5); x.restore();
            });
        }

        function save() { localStorage.setItem('b', b); localStorage.setItem('lv', lv); localStorage.setItem('e', e); localStorage.setItem('maxE', maxE); localStorage.setItem('clickLv', clickLv); localStorage.setItem('currentSkin', currentSkin); }
        function sh(el, id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active-screen'); el.classList.add('active');
        }

        setInterval(() => { if(e < maxE) e++; up(); }, 1500);
        drawW(); up();
    </script>
</body>
</html>
