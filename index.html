<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ESSE STUDIO v2</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{0;background:#000;color:#fff;font-family:Arial}
button{cursor:pointer}
.hidden{display:none}
.badge{background:gold;color:black;padding:2px 6px;border-radius:6px;font-size:10px}
</style>
</head>
<body>

<h2 align="center">💎 ESSE STUDIO – ULTRA NEON V2</h2>

<div align="center">
  <p>Balance: <b id="b">0</b></p>
  <p>Level: <span id="lv">1</span> | Prestige: <span id="pr">0</span></p>
  <p>Passive: <span id="ps">0</span>/s | Crit: <span id="crit">5%</span></p>
</div>

<hr>

<!-- CLICK -->
<div align="center">
  <button onclick="clickCoin()">CLICK</button>
</div>

<hr>

<!-- TASKS -->
<h3>📋 Daily Tasks</h3>
<ul id="tasks"></ul>
<button onclick="resetTasks()">Reset Tasks (Dev)</button>

<hr>

<!-- PRESTIGE -->
<h3>🌟 Prestige</h3>
<p>Reset everything, gain permanent +5% click power.</p>
<button onclick="prestige()">PRESTIGE</button>

<hr>

<!-- SKINS -->
<h3>🎨 Skins</h3>
<button onclick="buySkin('gold')">Gold Skin</button>
<button onclick="buySkin('neon')">Neon Skin</button>
<p>Active Skin: <span id="skin">default</span></p>

<hr>

<!-- EVENTS -->
<h3>🎉 Today Event</h3>
<p id="event">No Event</p>

<hr>

<!-- LEADERBOARD -->
<h3>🏆 Leaderboard (Local)</h3>
<ol id="lb"></ol>

<script>
/* ======================
   CORE STATE
====================== */
let state = JSON.parse(localStorage.getItem("esse_v2")) || {
  balance:0,
  level:1,
  prestige:0,
  passive:0,
  crit:0.05,
  skin:"default",
  tasks:{
    clicks:0,
    slot:false,
    upgrade:false
  },
  lastDay:new Date().toDateString()
};

function save(){
  localStorage.setItem("esse_v2",JSON.stringify(state));
}

function ui(){
  b.innerText = Math.floor(state.balance);
  lv.innerText = state.level;
  pr.innerText = state.prestige;
  ps.innerText = state.passive.toFixed(1);
  crit.innerText = Math.round(state.crit*100)+"%";
  skin.innerText = state.skin;
  renderTasks();
  renderLB();
}

ui();

/* ======================
   CLICK & CRIT
====================== */
function clickCoin(){
  let gain = 1 + state.prestige;
  if(Math.random()<state.crit){
    gain*=10;
    alert("CRIT x10!");
  }
  state.balance+=gain;
  state.tasks.clicks++;
  levelCheck();
  save();ui();
}

/* ======================
   LEVEL
====================== */
function levelCheck(){
  let need = state.level*500;
  if(state.balance>=need){
    state.level++;
    state.passive+=0.5;
  }
}

/* ======================
   TASKS
====================== */
function renderTasks(){
  tasks.innerHTML="";
  let t=[
    ["100 Clicks",state.tasks.clicks>=100],
    ["Play Slot",state.tasks.slot],
    ["Buy Upgrade",state.tasks.upgrade]
  ];
  t.forEach(x=>{
    let li=document.createElement("li");
    li.innerHTML=x[0]+" "+(x[1]?"✅":"❌");
    tasks.appendChild(li);
  });
}

function resetTasks(){
  state.tasks={clicks:0,slot:false,upgrade:false};
  save();ui();
}

/* ======================
   PRESTIGE
====================== */
function prestige(){
  if(state.level<10) return alert("Need Level 10");
  state.balance=0;
  state.level=1;
  state.passive=0;
  state.prestige++;
  state.crit+=0.02;
  save();ui();
}

/* ======================
   SKINS
====================== */
function buySkin(s){
  if(state.balance<1000) return;
  state.balance-=1000;
  state.skin=s;
  document.body.style.background = s==="gold"?"#332200":"#001122";
  save();ui();
}

/* ======================
   EVENT SYSTEM
====================== */
const events=["Turbo Day","+2 Passive","+50% Crit"];
let todayEvent = events[new Date().getDate()%events.length];
event.innerText=todayEvent;

/* ======================
   PASSIVE LOOP
====================== */
setInterval(()=>{
  state.balance+=state.passive/10;
  save();ui();
},100);

/* ======================
   LEADERBOARD
====================== */
function renderLB(){
  let lbData=JSON.parse(localStorage.getItem("lb")||"[]");
  lbData.push({s:state.balance,t:Date.now()});
  lbData=lbData.sort((a,b)=>b.s-a.s).slice(0,5);
  localStorage.setItem("lb",JSON.stringify(lbData));
  lb.innerHTML="";
  lbData.forEach(x=>{
    let li=document.createElement("li");
    li.innerText=Math.floor(x.s);
    lb.appendChild(li);
  });
}

/* ======================
   DAILY RESET
====================== */
if(state.lastDay!==new Date().toDateString()){
  state.tasks={clicks:0,slot:false,upgrade:false};
  state.lastDay=new Date().toDateString();
}
</script>

</body>
</html>
